<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Young KINGZ - Staff</title>
    <style>
        :root { 
            --bg-dark: #000000; 
            --card-bg: #0a0a0a; 
            --yk-red: #ff3e3e;   
            --border: rgba(255,255,255,0.08);
            --kick-green: #53fc18;
        }
        
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; color: white; text-align: center;
            background-color: var(--bg-dark);
            /* Fondo oscuro limpio sin texturas de terceros */
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9));
            background-attachment: fixed; background-size: cover;
        }

        .logo { width: 90px; height: 90px; margin-top: 30px; filter: drop-shadow(0 0 10px var(--yk-red)); }
        
        h1 { letter-spacing: 3px; margin-top: 15px; font-size: 26px; text-transform: uppercase; }

        /* BUSCADOR */
        .search-container { max-width: 400px; margin: 30px auto 10px auto; padding: 0 20px; }
        input { 
            width: 100%; background: #111; border: 1px solid var(--border); 
            padding: 12px 15px; border-radius: 10px; color: white; outline: none; 
            font-size: 14px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--yk-red); box-shadow: 0 0 10px rgba(255, 62, 62, 0.2); }

        /* COMUNIDAD X */
        .community-box { margin: 30px auto 40px auto; display: flex; justify-content: center; }
        .btn-twitter-main {
            display: inline-block; background: rgba(255, 255, 255, 0.05); color: white; 
            text-decoration: none; padding: 12px 25px; border-radius: 50px; 
            font-weight: bold; font-size: 13px; border: 1px solid var(--border); transition: 0.3s;
        }
        .btn-twitter-main:hover { border-color: var(--yk-red); transform: translateY(-2px); box-shadow: 0 0 15px rgba(255, 62, 62, 0.2); }

        /* CONTENEDOR DE TARJETAS */
        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; padding: 20px; max-width: 1400px; margin: 0 auto;
        }
        
        .card { 
            background-color: var(--card-bg); border-radius: 15px; 
            overflow: hidden; position: relative; transition: 0.3s ease;
            border: 1px solid rgba(255, 62, 62, 0.3); 
        }
        .card:hover { transform: translateY(-5px); border-color: var(--yk-red); box-shadow: 0 0 20px rgba(255, 62, 62, 0.2); }

        .card img { width: 100%; height: 190px; object-fit: cover; display: block; }
        .card-info { padding: 18px; text-align: left; }
        
        .tag-card { 
            position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.85); 
            color: #fff; padding: 5px 10px; border-radius: 6px; font-size: 10px; 
            border: 1px solid var(--border); text-transform: uppercase; font-weight: bold;
        }

        /* REDES SOCIALES EN TARJETA */
        .card-social { display: flex; gap: 8px; margin: 12px 0; }
        .social-link {
            width: 32px; height: 32px; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border); border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .social-link:hover { background: var(--yk-red); border-color: var(--yk-red); transform: translateY(-2px); }
        .social-link svg { width: 16px; height: 16px; fill: white; }

        /* BOTÓN KICK */
        .btn-kick { 
            display: block; text-align: center; background: rgba(255,255,255,0.03); 
            color: #777; padding: 10px; border-radius: 8px; text-decoration: none; 
            font-size: 12px; border: 1px solid rgba(255,255,255,0.06); 
            margin-top: 10px; font-weight: bold; transition: 0.3s;
        }
        
        .is-live { 
            background: rgba(83, 252, 24, 0.1) !important; 
            color: var(--kick-green) !important; 
            border-color: var(--kick-green) !important; 
        }
    </style>
</head>
<body>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKC_M8mScJ9red0kCpiM7MDjt8k44x_AzbNxVedok3rFyfnD2baQQfKOkT&s=10" class="logo" alt="Logo">
    <h1>YOUNG KINGZ</h1>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Buscar integrante..." onkeyup="filterCards()">
    </div>

    <div class="community-box">
        <a href="https://x.com/i/communities/1989361268348932148" target="_blank" class="btn-twitter-main">Unirse a la Comunidad en X</a>
    </div>

    <div class="container" id="membersContainer"></div>

    <script>
    // LISTA DE INTEGRANTES
    const members = [
        { 
            name: "Shawn Figueroa", nick: "ifatality", kick: "ifatality", 
            img: "https://i.pinimg.com/736x/f3/be/16/f3be16b166d80cbb65a3e100e46518da.jpg",
            ig: "#", tw: "#" 
        },
        { 
            name: "Valentina Rios", nick: "karen", kick: "klarent", 
            img: "https://files.kick.com/images/user/6979999/profile_image/conversion/7b507175-3f05-4e74-91f9-cab944e243de-fullsize.webp",
            ig: "#", tw: "#" 
        },
        { 
            name: "Triplex", nick: "triplex", kick: "triple-x-x-x", 
            img: "https://pbs.twimg.com/media/HEIxiSHX0AA89zt?format=jpg&name=large",
            ig: "#", tw: "#" 
        },
        { name: "luisiyo el pillo", nick: "iñaki", kick: "inakii22", img: "https://i.pinimg.com/564x/8b/7a/a5/8b7aa592128799f0ec1d602fb64969d5.jpg", ig: "#", tw: "#" },
        { name: "Integrante 5", nick: "Staff", kick: "user5", img: "https://via.placeholder.com/400x225/111/333?text=YK+KING", ig: "#", tw: "#" },
        { name: "Integrante 6", nick: "Staff", kick: "user6", img: "https://via.placeholder.com/400x225/111/333?text=YK+KING", ig: "#", tw: "#" },
        { name: "Integrante 7", nick: "Staff", kick: "user7", img: "https://via.placeholder.com/400x225/111/333?text=YK+KING", ig: "#", tw: "#" },
        { name: "Integrante 8", nick: "Staff", kick: "user8", img: "https://via.placeholder.com/400x225/111/333?text=YK+KING", ig: "#", tw: "#" },
        { name: "Integrante 9", nick: "Staff", kick: "user9", img: "https://via.placeholder.com/400x225/111/333?text=YK+KING", ig: "#", tw: "#" },
        { name: "Integrante 10", nick: "Staff", kick: "user10", img: "https://via.placeholder.com/400x225/111/333?text=YK+KING", ig: "#", tw: "#" },
        { name: "Integrante 11", nick: "Staff", kick: "user11", img: "https://via.placeholder.com/400x225/111/333?text=YK+KING", ig: "#", tw: "#" },
        { name: "Integrante 12", nick: "Staff", kick: "user12", img: "https://via.placeholder.com/400x225/111/333?text=YK+KING", ig: "#", tw: "#" },
        { name: "Integrante 13", nick: "Staff", kick: "user13", img: "https://via.placeholder.com/400x225/111/333?text=YK+KING", ig: "#", tw: "#" },
        { name: "Integrante 14", nick: "Staff", kick: "user14", img: "https://via.placeholder.com/400x225/111/333?text=YK+KING", ig: "#", tw: "#" },
        { name: "Integrante 15", nick: "Staff", kick: "user15", img: "https://via.placeholder.com/400x225/111/333?text=YK+KING", ig: "#", tw: "#" }
    ];

    const container = document.getElementById('membersContainer');

    const iconIG = `<svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>`;
    const iconTW = `<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`;

    function renderMembers() {
        container.innerHTML = members.map((m, index) => `
            <div class="card" data-name="${m.name} ${m.nick}">
                <span class="tag-card">Young Kingz</span>
                <img src="${m.img}" alt="${m.name}">
                <div class="card-info">
                    <h3 style="margin:0; font-size:17px; font-weight:bold;">${m.name}</h3>
                    <p style="margin:4px 0; color:#666; font-size:13px;">${m.nick}</p>
                    <div class="card-social">
                        <a href="${m.ig}" target="_blank" class="social-link">${iconIG}</a>
                        <a href="${m.tw}" target="_blank" class="social-link">${iconTW}</a>
                    </div>
                    <a href="https://kick.com/${m.kick}" target="_blank" id="status-${index}" class="btn-kick">Verificando...</a>
                </div>
            </div>
        `).join('');
    }

    async function checkKickStatus(username, elementId) {
        const btn = document.getElementById(elementId);
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://kick.com/api/v1/channels/' + username)}`);
            const json = await res.json();
            const data = JSON.parse(json.contents);
            if (data.livestream) {
                btn.innerText = "● EN VIVO";
                btn.classList.add('is-live');
            } else {
                btn.innerText = "OFFLINE";
                btn.classList.remove('is-live');
            }
        } catch (e) { btn.innerText = "OFFLINE"; }
    }

    function updateAllStatus() { members.forEach((m, i) => checkKickStatus(m.kick, `status-${i}`)); }
    function filterCards() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            card.style.display = card.getAttribute('data-name').toLowerCase().includes(query) ? "block" : "none";
        });
    }

    renderMembers();
    updateAllStatus();
    setInterval(updateAllStatus, 60000);
    </script>
</body>
</html>
